    // =========================================================================
    // Editor — shared by persistent program and blocks
    // =========================================================================
    let PROG_EDITOR = null; // { kind: 'persistent' | 'block', mode: 'modify'|'new', ... }

    function openProgramEditor() {
      // Persistent program editor — single-week template
      const sched = (STATE.persistentProgram.schedule || []).slice();
      // Pad missing days
      for (let d = 1; d <= 7; d++) {
        if (!sched.find(s => s.day === d)) sched.push({ day: d, type: 'Rest', label: 'Day ' + d });
      }
      sched.sort((a, b) => a.day - b.day);
      const exMap = {};
      const wp = (STATE.persistentProgram.program && STATE.persistentProgram.program['1']) || {};
      for (const [dayLabel, list] of Object.entries(wp)) {
        exMap[dayLabel] = list.map((p, i) => ({
          name: p.exerciseName, sets: p.targetSets, reps: p.targetReps,
          rpe: p.targetRPE, order: p.order || (i + 1),
        }));
      }
      PROG_EDITOR = {
        kind: 'persistent',
        weeks: [{ weekNumber: 1, schedule: sched, exercises: exMap }],
        selectedWeekIndex: 0,
      };
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('programEditorView').style.display = 'block';
      document.getElementById('progSaveBar').style.display = 'block';
      document.getElementById('saveBar').style.display = 'none';
      document.getElementById('progEditorTitle').textContent = STATE.persistentExists ? 'Edit Program' : 'Set Up Your Program';
      document.getElementById('progSaveBtn').textContent = 'Save Program';
      renderProgramEditor();
    }

    function openBlockEditor(mode) {
      if (mode === 'modify') {
        if (!STATE.currentBlock) { return openBlockEditor('new'); }
        const cb = STATE.currentBlock;
        PROG_EDITOR = {
          kind: 'block', mode: 'modify', blockId: cb.id,
          blockName: cb.name, lengthWeeks: cb.lengthWeeks, startDate: cb.startDate,
          weeks: hydrateEditorWeeks(cb), selectedWeekIndex: 0,
        };
      } else {
        const nextId = estimateNextBlockId();
        PROG_EDITOR = {
          kind: 'block', mode: 'new', blockId: null,
          blockName: 'Block ' + nextId,
          lengthWeeks: 4,
          startDate: STATE.todayStr,
          weeks: createEmptyWeeks(4),
          selectedWeekIndex: 0,
        };
      }
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('programEditorView').style.display = 'block';
      document.getElementById('progSaveBar').style.display = 'block';
      document.getElementById('saveBar').style.display = 'none';
      document.getElementById('progEditorTitle').textContent =
        PROG_EDITOR.mode === 'new' ? 'New Block' : 'Edit Block ' + PROG_EDITOR.blockId;
      document.getElementById('progSaveBtn').textContent =
        PROG_EDITOR.mode === 'new' ? 'Create Block' : 'Update Block';
      renderProgramEditor();
    }

    function closeProgramEditor() {
      document.getElementById('programEditorView').style.display = 'none';
      document.getElementById('progSaveBar').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
      PROG_EDITOR = null;
    }

    function estimateNextBlockId() {
      const ids = [...STATE.pastBlocks.map(b => b.id), ...(STATE.currentBlock ? [STATE.currentBlock.id] : [])];
      return ids.length > 0 ? Math.max(...ids, 1) + 1 : 2;
    }

    function createEmptyWeeks(n) {
      const result = [];
      for (let w = 1; w <= n; w++) {
        const schedule = [];
        for (let d = 1; d <= 7; d++) schedule.push({ day: d, type: 'Rest', label: 'Day ' + d });
        result.push({ weekNumber: w, schedule, exercises: {} });
      }
      return result;
    }

    function hydrateEditorWeeks(block) {
      const result = [];
      for (let w = 1; w <= block.lengthWeeks; w++) {
        const bw = block.weeks.find(x => x.weekNumber === w) || { schedule: [] };
        const schedule = bw.schedule.slice();
        for (let d = 1; d <= 7; d++) {
          if (!schedule.find(s => s.day === d)) schedule.push({ day: d, type: 'Rest', label: 'Day ' + d });
        }
        schedule.sort((a, b) => a.day - b.day);
        const wp = (block.program && block.program[String(w)]) || {};
        const exercises = {};
        for (const [dayLabel, list] of Object.entries(wp)) {
          exercises[dayLabel] = list.map((p, i) => ({
            name: p.exerciseName, sets: p.targetSets, reps: p.targetReps,
            rpe: p.targetRPE, order: p.order || (i + 1),
          }));
        }
        result.push({ weekNumber: w, schedule, exercises });
      }
      return result;
    }

    function hasWeekContent(w) {
      for (const d of w.schedule) {
        if (d.type !== 'Rest' && (w.exercises[d.label] || []).length > 0) return true;
      }
      return false;
    }

    function renderProgramEditor() {
      if (!PROG_EDITOR) return;
      const c = document.getElementById('progEditorContent');
      let html = '';
      const isBlock = PROG_EDITOR.kind === 'block';
      const isMultiWeek = isBlock && PROG_EDITOR.lengthWeeks > 1;

      // Header card
      if (isBlock) {
        html += '<div class="block-info-card">';
        html += '<div class="form-row"><label>Block Name</label><input type="text" value="' + esc(PROG_EDITOR.blockName) + '" oninput="onProgBlockNameChange(this.value)"></div>';
        html += '<div class="form-row"><label>Length (weeks)</label><select onchange="onProgLengthChange(parseInt(this.value))">';
        for (let i = 1; i <= 16; i++) {
          html += '<option value="' + i + '"' + (i === PROG_EDITOR.lengthWeeks ? ' selected' : '') + '>' + i + ' week' + (i > 1 ? 's' : '') + '</option>';
        }
        html += '</select></div>';
        if (PROG_EDITOR.mode === 'new') {
          html += '<div class="form-row"><label>Start Date (DD/MM/YYYY)</label><input type="text" value="' + esc(fmtDate(PROG_EDITOR.startDate)) + '" maxlength="10" oninput="autoFormatDate(this); onProgStartDateChange(this.value)"></div>';
          if (STATE.persistentExists || STATE.currentBlock || STATE.pastBlocks.length > 0) {
            html += '<button class="prog-copy-btn" onclick="openCopyFromSourceModal()">📋 Copy structure from program or block</button>';
          }
        } else {
          html += '<div class="form-row"><label>Start Date</label><div class="form-readonly">' + esc(fmtDate(PROG_EDITOR.startDate)) + ' (locked)</div></div>';
          if (STATE.currentBlock && STATE.currentBlock.id === PROG_EDITOR.blockId) {
            html += '<button class="btn btn-warn" onclick="endCurrentBlockHandler()" style="margin-top:8px;">⚠ End This Block Today</button>';
          }
        }
        html += '</div>';
      }

      if (isMultiWeek) {
        html += '<div class="week-tabs">';
        for (let i = 0; i < PROG_EDITOR.lengthWeeks; i++) {
          const w = PROG_EDITOR.weeks[i];
          const empty = !w || !hasWeekContent(w);
          html += '<button class="week-tab' + (i === PROG_EDITOR.selectedWeekIndex ? ' active' : '') + (empty && i !== PROG_EDITOR.selectedWeekIndex ? ' empty' : '') + '" onclick="selectEditorWeek(' + i + ')">Wk ' + (i + 1) + '</button>';
        }
        html += '</div>';
      }

      const week = PROG_EDITOR.weeks[PROG_EDITOR.selectedWeekIndex];
      if (!week) { html += '<div class="no-data">No week data</div>'; c.innerHTML = html; return; }

      if (isMultiWeek) {
        const otherWeeks = PROG_EDITOR.weeks.filter((w2, i) => i !== PROG_EDITOR.selectedWeekIndex && hasWeekContent(w2));
        if (otherWeeks.length > 0) html += '<button class="prog-copy-btn" onclick="openCopyFromWeekModal()">📋 Copy from another week</button>';
      }

      week.schedule.forEach((d, dayIdx) => {
        const wd = isBlock ? weekdayForBlockDay(PROG_EDITOR.startDate, week.weekNumber, d.day) : '';
        const canHaveExercises = d.type !== 'Rest';
        html += '<div class="prog-day-card">';
        html += '<div class="prog-day-header"><div><div class="prog-day-title">' + esc(d.label) + '</div>';
        if (wd) html += '<div class="prog-day-weekday">' + wd + '</div>';
        html += '</div></div>';
        html += '<select class="prog-type-select" onchange="onEditorDayTypeChange(' + dayIdx + ', this.value)">';
        ['Workout','Active Rest','Rest'].forEach(t => {
          html += '<option value="' + t + '"' + (d.type === t ? ' selected' : '') + '>' + t + '</option>';
        });
        html += '</select>';
        html += '<input type="text" class="prog-label-input" value="' + esc(d.label) + '" placeholder="Day label" onchange="onEditorDayLabelChange(' + dayIdx + ', this.value)">';
        html += '<div class="prog-exercises-section' + (canHaveExercises ? ' visible' : '') + '">';
        if (canHaveExercises) {
          const dayExs = week.exercises[d.label] || [];
          if (dayExs.length > 0) {
            html += '<div class="prog-ex-labels"><span>Order</span><span>Exercise</span><span>Sets</span><span>Reps</span><span>RPE</span><span></span></div>';
            dayExs.forEach((ex, j) => {
              const upDisabled = j === 0 ? ' disabled' : '';
              const downDisabled = j === dayExs.length - 1 ? ' disabled' : '';
              html += '<div class="prog-ex-row">' +
                '<div class="prog-ex-reorder">' +
                  '<button class="prog-reorder-btn"' + upDisabled + ' onclick="moveEditorExercise(' + dayIdx + ',' + j + ',-1)">▲</button>' +
                  '<button class="prog-reorder-btn"' + downDisabled + ' onclick="moveEditorExercise(' + dayIdx + ',' + j + ',1)">▼</button>' +
                '</div>' +
                '<div class="prog-ex-name-display" onclick="openEditorExercisePicker(' + dayIdx + ', ' + j + ')">' + esc(ex.name) + '</div>' +
                '<input type="number" inputmode="numeric" value="' + (ex.sets || '') + '" onchange="onEditorExField(' + dayIdx + ',' + j + ',\'sets\',this.value)">' +
                '<input type="text" value="' + esc(String(ex.reps || '')) + '" placeholder="8-12" onchange="onEditorExField(' + dayIdx + ',' + j + ',\'reps\',this.value)">' +
                '<input type="text" value="' + esc(String(ex.rpe || '')) + '" placeholder="RPE" onchange="onEditorExField(' + dayIdx + ',' + j + ',\'rpe\',this.value)">' +
                '<button class="prog-remove-btn" onclick="removeEditorExercise(' + dayIdx + ',' + j + ')">✕</button></div>';
            });
          }
          html += '<button class="add-set-btn" style="margin-top:8px;" onclick="openEditorExercisePicker(' + dayIdx + ', -1)">+ Add Exercise</button>';
          const otherDays = week.schedule.filter((od, oi) =>
            oi !== dayIdx && od.type !== 'Rest' && (week.exercises[od.label] || []).length > 0);
          if (otherDays.length > 0) {
            html += '<button class="prog-copy-btn" onclick="openCopyFromDayModal(' + dayIdx + ')">📋 Copy from another day</button>';
          }
        }
        html += '</div></div>';
      });
      c.innerHTML = html;
    }

    function weekdayForBlockDay(startDate, weekNumber, dayInWeek) {
      if (!startDate) return '';
      const start = new Date(startDate + 'T00:00:00');
      const offset = (weekNumber - 1) * 7 + (dayInWeek - 1);
      const d = new Date(start.getTime() + offset * 86400000);
      return FULL_WEEKDAYS[d.getDay()];
    }

    function selectEditorWeek(idx) { PROG_EDITOR.selectedWeekIndex = idx; renderProgramEditor(); }
    function onProgBlockNameChange(v) { PROG_EDITOR.blockName = v; }
    function onProgLengthChange(n) {
      if (n < 1) n = 1;
      if (n === PROG_EDITOR.lengthWeeks) return;
      if (n > PROG_EDITOR.lengthWeeks) {
        for (let i = PROG_EDITOR.lengthWeeks + 1; i <= n; i++) {
          if (!PROG_EDITOR.weeks[i - 1]) {
            const schedule = [];
            for (let d = 1; d <= 7; d++) schedule.push({ day: d, type: 'Rest', label: 'Day ' + d });
            PROG_EDITOR.weeks[i - 1] = { weekNumber: i, schedule, exercises: {} };
          }
        }
      }
      PROG_EDITOR.lengthWeeks = n;
      if (PROG_EDITOR.selectedWeekIndex >= n) PROG_EDITOR.selectedWeekIndex = n - 1;
      renderProgramEditor();
    }
    function onProgStartDateChange(displayValue) {
      const iso = parseDDMMYYYY(displayValue);
      if (iso) PROG_EDITOR.startDate = iso;
    }
    function onEditorDayTypeChange(dayIdx, newType) {
      PROG_EDITOR.weeks[PROG_EDITOR.selectedWeekIndex].schedule[dayIdx].type = newType;
      renderProgramEditor();
    }
    function onEditorDayLabelChange(dayIdx, newLabel) {
      const week = PROG_EDITOR.weeks[PROG_EDITOR.selectedWeekIndex];
      const d = week.schedule[dayIdx];
      const oldLabel = d.label;
      d.label = newLabel;
      if (oldLabel !== newLabel && week.exercises[oldLabel]) {
        week.exercises[newLabel] = week.exercises[oldLabel];
        delete week.exercises[oldLabel];
      }
      renderProgramEditor();
    }
    function onEditorExField(dayIdx, exIdx, field, value) {
      const week = PROG_EDITOR.weeks[PROG_EDITOR.selectedWeekIndex];
      const d = week.schedule[dayIdx];
      const ex = (week.exercises[d.label] || [])[exIdx];
      if (ex) ex[field] = value;
    }
    function removeEditorExercise(dayIdx, exIdx) {
      const week = PROG_EDITOR.weeks[PROG_EDITOR.selectedWeekIndex];
      const d = week.schedule[dayIdx];
      const list = week.exercises[d.label] || [];
      list.splice(exIdx, 1);
      renderProgramEditor();
    }
    function moveEditorExercise(dayIdx, exIdx, direction) {
      const week = PROG_EDITOR.weeks[PROG_EDITOR.selectedWeekIndex];
      const d = week.schedule[dayIdx];
      const list = week.exercises[d.label] || [];
      const newIdx = exIdx + direction;
      if (newIdx < 0 || newIdx >= list.length) return;
      [list[exIdx], list[newIdx]] = [list[newIdx], list[exIdx]];
      renderProgramEditor();
    }
    function openEditorExercisePicker(dayIdx, exIdx) {
      pickerMode = 'program-add';
      programPickerDayIdx = dayIdx;
      document.getElementById('addExModal').dataset.progExIdx = exIdx;
      openExerciseModal(exIdx >= 0 ? 'Replace Exercise' : 'Add Exercise', new Set());
    }
    function addExerciseToEditorDay(dayIdx, exerciseName) {
      const week = PROG_EDITOR.weeks[PROG_EDITOR.selectedWeekIndex];
      const d = week.schedule[dayIdx];
      if (!week.exercises[d.label]) week.exercises[d.label] = [];
      const exIdx = parseInt(document.getElementById('addExModal').dataset.progExIdx || '-1');
      if (exIdx >= 0 && week.exercises[d.label][exIdx]) {

    function openCopyFromSourceModal() {
      // Available sources for a new block: the persistent program + all blocks
      const items = [];
      if (STATE.persistentExists) {
        const exCount = Object.values(STATE.persistentProgram.program['1'] || {}).reduce((s, arr) => s + arr.length, 0);
        items.push({
          value: 'persistent',
          html: 'Persistent Program<div class="ex-pick-meta">1 week · ' + exCount + ' exercise(s)</div>',
        });
      }
      const allBlocks = [
        ...STATE.pastBlocks,
        ...(STATE.currentBlock ? [STATE.currentBlock] : []),
      ];
      for (const b of allBlocks) {
        const exCount = Object.values(b.program || {}).reduce((sum, week) =>
          sum + Object.values(week).reduce((s2, arr) => s2 + arr.length, 0), 0);
        const tag = STATE.currentBlock && b.id === STATE.currentBlock.id ? ' (current)' : '';
        items.push({
          value: 'block_' + b.id,
          html: 'Block ' + b.id + ': ' + esc(b.name) + tag + '<div class="ex-pick-meta">' + b.lengthWeeks + ' week(s), ' + exCount + ' exercise entries</div>',
        });
      }
      openGenericPicker('Copy from program or block', items, (val) => {
        if (val === 'persistent') {
          // Copy persistent program into week 1, leave other weeks empty
          const sched = (STATE.persistentProgram.schedule || []).slice();
          for (let d = 1; d <= 7; d++) {
            if (!sched.find(s => s.day === d)) sched.push({ day: d, type: 'Rest', label: 'Day ' + d });
          }
          sched.sort((a, b) => a.day - b.day);
          const wp = (STATE.persistentProgram.program && STATE.persistentProgram.program['1']) || {};
          const exMap = {};
          for (const [dayLabel, list] of Object.entries(wp)) {
            exMap[dayLabel] = JSON.parse(JSON.stringify(list.map((p, i) => ({
              name: p.exerciseName, sets: p.targetSets, reps: p.targetReps,
              rpe: p.targetRPE, order: p.order || (i + 1),
            }))));
          }
          PROG_EDITOR.weeks[0] = { weekNumber: 1, schedule: JSON.parse(JSON.stringify(sched)), exercises: exMap };
          // Replicate to all other weeks (typical pattern: same template each week, modify later)
          for (let i = 1; i < PROG_EDITOR.lengthWeeks; i++) {
            PROG_EDITOR.weeks[i] = {
              weekNumber: i + 1,
              schedule: JSON.parse(JSON.stringify(sched)),
              exercises: JSON.parse(JSON.stringify(exMap)),
            };
          }
          renderProgramEditor();
          showToast('Persistent program copied ✓');
        } else if (val.startsWith('block_')) {
          const id = parseInt(val.slice(6));
          const source = (STATE.currentBlock && STATE.currentBlock.id === id) ? STATE.currentBlock : STATE.pastBlocks.find(b => b.id === id);
          if (!source) return;
          PROG_EDITOR.lengthWeeks = source.lengthWeeks;
          PROG_EDITOR.weeks = hydrateEditorWeeks(source);
          PROG_EDITOR.selectedWeekIndex = 0;
          renderProgramEditor();
          showToast('Structure copied ✓');
        }
      });
    }

    function savePersistentFromEditor() {
      const week = PROG_EDITOR.weeks[0];
      // Validate at least one workout day with exercises (relaxed for persistent —
      // a user might want to set up a Rest-only template, but that's unusual).
      // We do require unique workout-day labels.
      const seenLabels = new Set();
      for (const d of week.schedule) {
        if (d.type === 'Rest') continue;
        const l = String(d.label || '').trim();
        if (seenLabels.has(l)) {
          showToast('Workout/active-rest days must have unique labels (duplicate: "' + l + '")', true);
          return;
        }
        seenLabels.add(l);
      }
      const exMap = {};
      for (const d of week.schedule) {
        if (d.type === 'Rest') continue;
        const list = week.exercises[d.label] || [];
        if (list.length > 0) {
          exMap[d.label] = list.map((ex, idx) => ({
            name: ex.name, sets: ex.sets || 3, reps: ex.reps || '', rpe: ex.rpe || '',
            order: idx + 1,
          }));
        }
      }
      const payload = { schedule: week.schedule, exercises: exMap };
      const btn = document.getElementById('progSaveBtn');
      btn.textContent = 'Saving…'; btn.disabled = true;
      google.script.run.withSuccessHandler(raw => {
        const r = JSON.parse(raw);
        if (r.success) {
          showToast('Program saved ✓');
          closeProgramEditor();
          reloadInitData();
        } else {
          showToast(r.message || 'Save failed', true);
          btn.textContent = 'Save Program'; btn.disabled = false;
        }
      }).withFailureHandler(e => {
        showToast('Error: ' + e.message, true);
        btn.textContent = 'Save Program'; btn.disabled = false;
      }).savePersistentProgram(payload);
    }

    function saveBlockFromEditor() {
      if (!PROG_EDITOR.blockName.trim()) { showToast('Block name required', true); return; }
      if (PROG_EDITOR.lengthWeeks < 1) { showToast('Length must be at least 1 week', true); return; }
      if (PROG_EDITOR.mode === 'new' && !PROG_EDITOR.startDate) { showToast('Invalid start date', true); return; }
      let hasAnyEx = false;
      for (let i = 0; i < PROG_EDITOR.lengthWeeks; i++) {
        const w = PROG_EDITOR.weeks[i];
        if (!w) continue;
        for (const d of w.schedule) {
          if (d.type !== 'Rest' && (w.exercises[d.label] || []).length > 0) { hasAnyEx = true; break; }
        }
        if (hasAnyEx) break;
      }
      if (!hasAnyEx) { showToast('Add at least one exercise to a workout day', true); return; }
      const payload = {
        id: PROG_EDITOR.mode === 'new' ? null : PROG_EDITOR.blockId,
        name: PROG_EDITOR.blockName.trim(),
        lengthWeeks: PROG_EDITOR.lengthWeeks,
        startDate: PROG_EDITOR.mode === 'new' ? PROG_EDITOR.startDate : undefined,
        weeks: [],
      };
      for (let i = 0; i < PROG_EDITOR.lengthWeeks; i++) {
        const w = PROG_EDITOR.weeks[i];
        if (!w) continue;
        const exMap = {};
        for (const d of w.schedule) {
          if (d.type === 'Rest') continue;
          const list = w.exercises[d.label] || [];
          if (list.length > 0) {
            exMap[d.label] = list.map((ex, idx) => ({
              name: ex.name, sets: ex.sets || 3, reps: ex.reps || '', rpe: ex.rpe || '',
              order: idx + 1,
            }));
          }
        }
        payload.weeks.push({ weekNumber: w.weekNumber, schedule: w.schedule, exercises: exMap });
      }
      const btn = document.getElementById('progSaveBtn');
      btn.textContent = 'Saving…'; btn.disabled = true;
      google.script.run.withSuccessHandler(raw => {
        const r = JSON.parse(raw);
        if (r.success) {
          showToast(PROG_EDITOR.mode === 'new' ? 'Block created ✓' : 'Block updated ✓');
          closeProgramEditor();
          reloadInitData();
        } else {
          showToast(r.message || 'Save failed', true);
          btn.textContent = PROG_EDITOR && PROG_EDITOR.mode === 'new' ? 'Create Block' : 'Update Block';
          btn.disabled = false;
        }
      }).withFailureHandler(e => {
        showToast('Error: ' + e.message, true);
        btn.textContent = PROG_EDITOR && PROG_EDITOR.mode === 'new' ? 'Create Block' : 'Update Block';
        btn.disabled = false;
      }).saveBlock(payload);
    }

    function calcBodyFat(weight, waist, neck, hips, heightCm, gender) {
      if (!waist || !neck || !heightCm || waist <= neck) return null;
      let density;
      if (gender === 'female') {
        if (!hips) return null;
        density = 1.29579 - 0.35004 * Math.log10(waist + hips - neck) + 0.22100 * Math.log10(heightCm);
      } else {
        density = 1.0324 - 0.19077 * Math.log10(waist - neck) + 0.15456 * Math.log10(heightCm);
      }
      return Math.max(0, Math.round((495 / density - 450) * 10) / 10);
    }
    const ACTIVITY_MULTIPLIERS = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725, very_active: 1.9 };
    function calcTDEE(weight, heightCm, age, gender, activity) {
      if (!weight || !heightCm || !age) return null;
      const offset = gender === 'female' ? -161 : 5;
      const bmr = 10 * weight + 6.25 * heightCm - 5 * age + offset;
      return Math.round(bmr * (ACTIVITY_MULTIPLIERS[activity] || 1.55));
    }
    function calcMacros(w, target, goal) {
      const pKg = goal === 'cut' ? 2.2 : goal === 'bulk' ? 2.0 : 1.8;
      const fKg = goal === 'cut' ? 0.8 : 1.0;
      const pG = Math.round(w * pKg), fG = Math.round(w * fKg);
      const cCal = Math.max(0, target - pG * 4 - fG * 9);
      return { proteinG: pG, fatG: fG, carbG: Math.round(cCal / 4) };
    }
    function renderBodyStats() { recalcBodyStats(); }
    function recalcBodyStats() {
      if (!bodyData || !bodyData.entries.length) return;
      const s = bodyData.settings, e = bodyData.entries;
      const latest = e[e.length - 1];
      const goal = document.getElementById('bodyGoal').value;
      const age = s.birthYear ? new Date().getFullYear() - s.birthYear : null;
      let bf = null;
      for (let i = e.length - 1; i >= 0; i--) {
        if (e[i].waist && e[i].neck) { bf = calcBodyFat(e[i].weight, e[i].waist, e[i].neck, e[i].hips, s.heightCm, s.gender); break; }
      }
      const tdee = latest.weight ? calcTDEE(latest.weight, s.heightCm, age, s.gender, s.activityLevel) : null;
      let target = tdee;
      if (tdee) { if (goal === 'bulk') target = tdee + 350; else if (goal === 'cut') target = tdee - 500; }
      const macros = (latest.weight && target) ? calcMacros(latest.weight, target, goal) : null;
      let wChange = null;
      if (e.length >= 2) { const f = e.find(x => x.weight); if (f && latest.weight) wChange = Math.round((latest.weight - f.weight) * 10) / 10; }
      let lean = null, fat = null;
      if (latest.weight && bf !== null) {
        fat = Math.round(latest.weight * (bf / 100) * 10) / 10;
        lean = Math.round((latest.weight - fat) * 10) / 10;
      }
      document.getElementById('bodyStatsCards').innerHTML =
        '<div class="stat-card"><div class="stat-label">Weight</div><div class="stat-value">' + (latest.weight ? latest.weight + ' kg' : '—') + '</div><div class="stat-sub">' +
          (wChange !== null ? '<span class="stat-change ' + (wChange >= 0 ? 'positive' : 'negative') + '">' + (wChange >= 0 ? '+' : '') + wChange + ' kg</span>' : fmtDate(latest.date)) + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Body Fat</div><div class="stat-value">' + (bf !== null ? bf + '%' : '—') + '</div><div class="stat-sub">' +
          (lean !== null ? lean + ' kg lean · ' + fat + ' kg fat' : 'Need waist + neck') + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">TDEE</div><div class="stat-value">' + (tdee ? tdee + ' kcal' : '—') + '</div><div class="stat-sub">' + (s.activityLevel || '') + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">Target (' + goal + ')</div><div class="stat-value">' + (target ? target + ' kcal' : '—') + '</div><div class="stat-sub">' +
          (tdee ? (goal === 'bulk' ? 'TDEE +350' : goal === 'cut' ? 'TDEE −500' : 'TDEE') : '') + '</div></div>';
      const dd = document.getElementById('bodyDietInfo');
      if (macros && target) {
        const tip = goal === 'bulk' ? 'Slow surplus ~350 kcal. Progressive overload.'
          : goal === 'cut' ? '~0.5 kg/week loss. Keep protein high.' : 'Maintenance. Track weekly averages.';
        dd.innerHTML = '<div class="diet-card"><div class="diet-title">Suggested Macros</div>' +
          '<div class="diet-row"><span class="diet-label">Protein</span><span class="diet-value">' + macros.proteinG + ' g</span></div>' +
          '<div class="diet-row"><span class="diet-label">Fat</span><span class="diet-value">' + macros.fatG + ' g</span></div>' +
          '<div class="diet-row"><span class="diet-label">Carbs</span><span class="diet-value">' + macros.carbG + ' g</span></div>' +
          '<div class="diet-row" style="border-top:1px solid var(--border);margin-top:6px;padding-top:8px;"><span class="diet-label">Total</span><span class="diet-value">' + target + ' kcal</span></div>' +
          '<div class="diet-tip">' + tip + '</div></div>';
      } else { dd.innerHTML = ''; }
    }
    function renderBodyCharts() {
      if (!bodyData || !bodyData.entries.length) return;
      const e = bodyData.entries, s = bodyData.settings;
      const c = document.getElementById('bodyCharts');
      const we = e.filter(x => x.weight);
      const bfe = e.filter(x => x.waist && x.neck)
        .map(x => ({ date: x.date, bf: calcBodyFat(x.weight, x.waist, x.neck, x.hips, s.heightCm, s.gender) }))
        .filter(x => x.bf !== null);
      if (!we.length && !bfe.length) { c.innerHTML = '<div class="no-data">Log entries to see trends.</div>'; return; }
      let html = '';
      if (we.length) html += '<div class="chart-container"><div class="chart-title">Weight Trend</div><div id="chartWeightBody" style="width:100%;height:220px;"></div></div>';
      if (bfe.length) html += '<div class="chart-container"><div class="chart-title">Body Fat % Trend</div><div id="chartBF" style="width:100%;height:220px;"></div></div>';
      c.innerHTML = html;
      if (we.length) drawChart('chartWeightBody', we.map(x => [fmtDate(x.date), x.weight]), 'kg', '#6c8cff');
      if (bfe.length) drawChart('chartBF', bfe.map(x => [fmtDate(x.date), x.bf]), '%', '#fbbf24');
    }

    // =========================================================================
    // Tabs & utils
    // =========================================================================
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === 'screen-' + tab));
      if (tab === 'progress' || tab === 'body') document.getElementById('saveBar').style.display = 'none';
      else if (STATE.sessionActive) document.getElementById('saveBar').style.display = 'block';
      if (tab === 'body') initBodyTab();
    }
    function esc(str) { const d = document.createElement('div'); d.textContent = String(str == null ? '' : str); return d.innerHTML; }
    function fmtDate(dateStr) {
      if (!dateStr || dateStr.length !== 10) return dateStr || '';
      const [y, m, d] = dateStr.split('-');
      return d + '/' + m + '/' + y;
    }
    function parseDDMMYYYY(str) {
      if (!str) return null;
      const parts = str.split('/');
      if (parts.length !== 3) return null;
      const [d, m, y] = parts;
      const day = parseInt(d, 10), month = parseInt(m, 10), year = parseInt(y, 10);
      if (isNaN(day) || isNaN(month) || isNaN(year) || y.length !== 4) return null;
      if (month < 1 || month > 12 || day < 1 || day > 31) return null;
      return year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
    }
    function autoFormatDate(el) {
      let v = el.value.replace(/[^0-9/]/g, '');
      const digits = v.replace(/\//g, '');
      if (digits.length >= 4) v = digits.slice(0, 2) + '/' + digits.slice(2, 4) + '/' + digits.slice(4, 8);
      else if (digits.length >= 2) v = digits.slice(0, 2) + '/' + digits.slice(2);
      el.value = v;
    }
    function fmtDateLong(dateStr) {
      const dt = new Date(dateStr + 'T00:00:00');
      return dt.toLocaleDateString('en-GB', { weekday: 'long' }) + ', ' +
        dt.getDate() + ' ' + dt.toLocaleDateString('en-GB', { month: 'short' }) + ' ' + dt.getFullYear();
    }
    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => t.className = 'toast', 2500);
    }
  </script>
</body>
